<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omega | Terminal</title>
    <style>
        :root {
            --green: #00c196; --red: #ff444f; --bg: #f8f9fa;
            --text: #32373c; --muted: #999ea3; --border: #f1f3f5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: white; margin: 0; color: var(--text); overflow: hidden; }

        /* Header */
        header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 5px; font-weight: 700; }
        .logo b { background: var(--green); color: white; padding: 2px 6px; border-radius: 4px; }
        .bal { background: #f0f2f4; padding: 4px 10px; border-radius: 15px; font-size: 13px; font-weight: 600; }
        .btn-dep { background: var(--green); color: white; border: none; padding: 6px 12px; border-radius: 15px; font-weight: 700; font-size: 12px; }

        /* Tabs */
        .tabs { display: flex; padding: 8px 12px; gap: 10px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab { font-size: 12px; font-weight: 600; color: var(--muted); padding: 4px 8px; border-radius: 12px; white-space: nowrap; cursor: pointer; }
        .tab.active { background: #e6f9f5; color: var(--green); }

        /* Market & Chart */
        .mkt-box { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
        select { border: 1px solid var(--border); padding: 4px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .price { font-size: 28px; font-weight: 800; padding: 0 12px; }
        .pct { color: var(--red); font-size: 11px; font-weight: 700; margin-left: 5px; }
        
        #chart-container { height: 80px; width: 100%; padding: 0 12px; margin-bottom: 5px; }
        svg { width: 100%; height: 100%; }

        /* Small Digit Stats */
        .stats { display: flex; justify-content: space-between; padding: 5px 12px; margin-bottom: 5px; }
        .s-box { text-align: center; flex: 1; }
        .circle { width: 22px; height: 22px; border: 1.5px solid #e9ecef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; margin: 0 auto; position: relative; }
        .circle.active { border-color: var(--green); color: var(--green); }
        .s-pct { font-size: 8px; color: var(--muted); transform: scale(0.9); }

        /* Controls */
        .modes { display: flex; border-top: 1px solid var(--border); }
        .m-btn { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); }
        .m-btn.active { background: #e6f9f5; color: var(--green); border-bottom: 2px solid var(--green); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
        .cell { background: white; padding: 12px; text-align: center; }
        .full { grid-column: span 2; }
        .lbl { font-size: 9px; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
        .val { font-size: 15px; font-weight: 800; }

        /* Prediction Bar */
        .pred { display: flex; justify-content: space-around; padding: 8px; background: #fff; border-top: 1px solid var(--border); }
        .p-n { font-size: 11px; font-weight: 800; color: #ced4da; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
        .p-n.sel { color: var(--green); background: #e6f9f5; }

        /* Footer Actions */
        .btns { display: grid; grid-template-columns: 1fr 1fr; }
        .act { border: none; padding: 15px; color: white; font-weight: 800; cursor: pointer; }
        .act span { display: block; font-size: 9px; font-weight: 400; opacity: 0.8; margin-top: 2px; }
        .b-1 { background: var(--green); }
        .b-2 { background: var(--red); }
    </style>
</head>
<body>

<header>
    <div class="logo"><b>B</b> Beta</div>
    <div class="bal">R $0.00</div>
    <button class="btn-dep">Deposit</button>
</header>

<div class="tabs" id="market-tabs">
    <div class="tab active" onclick="switchMode('matches')">Matches/Differs</div>
    <div class="tab" onclick="switchMode('evenodd')">Even/Odd</div>
    <div class="tab" onclick="switchMode('overunder')">Over/Under</div>
</div>

<div class="mkt-box">
    <select id="vol-select">
        <option>Vol 10 (1s)</option>
        <option>Vol 50 (1s)</option>
        <option>Vol 100 (1s)</option>
    </select>
</div>

<div class="price" id="p-main">9328.72 <span class="pct">-1.83%</span></div>

<div id="chart-container">
    <svg viewBox="0 0 400 80"><polyline id="chart-line" fill="none" stroke="#00c196" stroke-width="2" points=""/></svg>
</div>

<div class="stats" id="digits"></div>

<div class="modes">
    <div class="m-btn active">AUTO</div>
    <div class="m-btn">MANUAL</div>
</div>

<div class="grid">
    <div class="cell full"><div class="lbl">Stake</div><div class="val">$ 10</div></div>
    <div class="cell"><div class="lbl">Take Profit</div><div class="val" style="color:var(--green);">$ 200</div></div>
    <div class="cell"><div class="lbl">Stop Loss</div><div class="val" style="color:var(--red);">$ 999</div></div>
</div>

<div class="pred" id="pred-bar">
    <div class="p-n">0</div><div class="p-n">1</div><div class="p-n">2</div><div class="p-n">3</div><div class="p-n">4</div>
    <div class="p-n sel">5</div>
    <div class="p-n">6</div><div class="p-n">7</div><div class="p-n">8</div><div class="p-n">9</div>
</div>

<div class="btns" id="action-area">
    </div>

<script>
    let price = 9328.72;
    let points = [];
    let currentMode = 'matches';
    let vip = false;

    function engine() {
        setInterval(() => {
            let drift = (Math.random() - 0.5) * 1.5;
            price += drift;

            // Forced Win Logic
            if(vip) {
                if(currentMode === 'matches') price = Math.floor(price * 10) / 10 + 0.05;
                if(currentMode === 'evenodd') price = Math.floor(price * 10) / 10 + 0.02; // Force Even
                if(currentMode === 'overunder') price = Math.floor(price * 10) / 10 + 0.08; // Force Over
            }

            document.getElementById('p-main').innerHTML = `${price.toFixed(2)} <span class="pct">-1.83%</span>`;
            
            // Chart update
            points.push(price);
            if(points.length > 40) points.shift();
            updateChart();

            // Digits update
            updateDigits();
        }, 1000);
    }

    function updateChart() {
        let max = Math.max(...points);
        let min = Math.min(...points);
        let range = max - min || 1;
        let polyPoints = points.map((p, i) => `${(i * 10)},${80 - ((p - min) / range * 60 + 10)}`).join(' ');
        document.getElementById('chart-line').setAttribute('points', polyPoints);
    }

    function updateDigits() {
        let last = Math.floor(price * 100) % 10;
        let html = '';
        for(let i=0; i<10; i++){
            html += `<div class="s-box"><div class="circle ${i===last?'active':''}">${i}</div><div class="s-pct">10.${i}%</div></div>`;
        }
        document.getElementById('digits').innerHTML = html;
    }

    function switchMode(m) {
        currentMode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        const area = document.getElementById('action-area');
        const predBar = document.getElementById('pred-bar');
        
        if(m === 'matches') {
            area.innerHTML = `<button class="act b-1" onclick="vip=true">Match<span>850% • $95.00</span></button>
                             <button class="act b-2">Differ<span>5.6% • $10.56</span></button>`;
            predBar.style.display = 'flex';
        } else if(m === 'evenodd') {
            area.innerHTML = `<button class="act b-1" onclick="vip=true">Even<span>95% • $19.50</span></button>
                             <button class="act b-2">Odd<span>95% • $19.50</span></button>`;
            predBar.style.display = 'none';
        } else if(m === 'overunder') {
            area.innerHTML = `<button class="act b-1" onclick="vip=true">Over<span>137% • $23.75</span></button>
                             <button class="act b-2">Under<span>90% • $19.00</span></button>`;
            predBar.style.display = 'flex';
        }
    }

    window.onload = () => { switchMode('matches'); engine(); };
</script>

</body>
</html>
