<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Binary | Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        
        body { 
            background-color: #06080c; 
            color: #cbd5e1; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* BetaBinary Glass Effect */
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .active-tab {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }

        /* Call/Put Button Styles from Screenshots */
        .btn-call {
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-put {
            background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }

        .market-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="h-14 border-b border-white/5 bg-[#0a0f18] flex items-center justify-between px-4">
        <div class="flex items-center gap-6">
            <div class="text-blue-500 font-black text-xl tracking-tighter uppercase">Apex<span class="text-white">Binary</span></div>
            <nav class="hidden md:flex gap-6 text-xs font-semibold uppercase tracking-wider">
                <a href="#" class="active-tab pb-4">Trade</a>
                <a href="#" class="text-slate-500 hover:text-white pb-4">Assets</a>
                <a href="#" class="text-slate-500 hover:text-white pb-4">History</a>
            </nav>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="bg-[#1e293b] px-3 py-1.5 rounded-lg border border-white/10 flex flex-col items-end">
                <span class="text-[9px] text-slate-500 font-bold uppercase">Real Balance</span>
                <span class="text-emerald-400 mono text-sm font-bold">$1,450.25</span>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded-md transition">DEPOSIT</button>
        </div>
    </header>

    <div class="h-10 bg-[#06080c] border-b border-white/5 flex items-center px-4 gap-4 overflow-x-auto market-scroll">
        <div class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded text-[11px] whitespace-nowrap">
            <span class="text-slate-400">Volatility 10:</span>
            <span class="text-emerald-400 mono">145.23</span>
        </div>
        <div class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded text-[11px] whitespace-nowrap border border-blue-500/30">
            <span class="text-blue-400 font-bold">Volatility 100:</span>
            <span class="text-emerald-400 mono">8921.40</span>
        </div>
        <div class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded text-[11px] whitespace-nowrap">
            <span class="text-slate-400">Crash 500:</span>
            <span class="text-red-400 mono">4412.10</span>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        
        <main class="flex-1 bg-[#05070a] relative flex flex-col">
            <div class="flex-1 w-full flex items-center justify-center text-slate-800">
                <i class="fas fa-chart-line text-9xl opacity-10"></i>
                <div class="absolute inset-0 p-4">
                    <div class="glass-card w-48 p-3 rounded-xl">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Current Asset</p>
                        <p class="text-lg font-black">Volatility 100 (1s)</p>
                    </div>
                </div>
            </div>

            <div class="h-32 bg-[#0a0f18] border-t border-white/5 p-3 overflow-y-auto">
                <table class="w-full text-[11px] text-left">
                    <thead class="text-slate-500 uppercase">
                        <tr>
                            <th class="pb-2">Time</th>
                            <th class="pb-2">Asset</th>
                            <th class="pb-2">Direction</th>
                            <th class="pb-2">Amount</th>
                            <th class="pb-2">Status</th>
                        </tr>
                    </thead>
                    <tbody class="mono text-slate-300">
                        <tr class="border-b border-white/5">
                            <td class="py-1">15:42:01</td>
                            <td>Vol 100</td>
                            <td class="text-emerald-500">CALL</td>
                            <td>$10.00</td>
                            <td class="text-emerald-400 font-bold">+$8.40</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <aside class="w-80 bg-[#0a0f18] border-l border-white/5 p-5 flex flex-col gap-6">
            
            <div class="flex flex-col gap-2">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Stake Amount</label>
                <div class="flex items-center gap-2">
                    <button class="bg-white/5 hover:bg-white/10 w-10 h-10 rounded border border-white/10">-</button>
                    <input type="text" value="10.00" class="flex-1 bg-[#06080c] border border-white/10 rounded h-10 text-center mono font-bold text-blue-400 focus:border-blue-500 outline-none">
                    <button class="bg-white/5 hover:bg-white/10 w-10 h-10 rounded border border-white/10">+</button>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Duration</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="bg-blue-600/20 border border-blue-500/50 text-blue-400 py-2 rounded text-xs font-bold">1 Min</button>
                    <button class="bg-white/5 border border-white/10 text-slate-400 py-2 rounded text-xs font-bold">5 Min</button>
                </div>
            </div>

            <div class="mt-auto flex flex-col gap-4">
                <div class="flex justify-between items-center px-1">
                    <span class="text-xs text-slate-500">Payout (84%)</span>
                    <span class="text-emerald-400 font-bold mono">$18.40</span>
                </div>
                
                <button class="btn-call h-16 rounded-xl flex items-center justify-between px-6 group active:scale-95 transition">
                    <span class="flex flex-col items-start">
                        <span class="text-[10px] text-white/60 font-bold uppercase">Market Goes</span>
                        <span class="text-xl font-black text-white">UP</span>
                    </span>
                    <i class="fas fa-arrow-trend-up text-2xl text-white/40 group-hover:text-white transition"></i>
                </button>

                <button class="btn-put h-16 rounded-xl flex items-center justify-between px-6 group active:scale-95 transition">
                    <span class="flex flex-col items-start">
                        <span class="text-[10px] text-white/60 font-bold uppercase">Market Goes</span>
                        <span class="text-xl font-black text-white">DOWN</span>
                    </span>
                    <i class="fas fa-arrow-trend-down text-2xl text-white/40 group-hover:text-white transition"></i>
                </button>
            </div>
        </aside>
    </div>

</body>
</html>
