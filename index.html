<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Beta Trader</title>
<style>
  :root{
    --bg:#ffffff; --surface:#ffffff; --soft:#f6f7f9; --line:#e9ecef;
    --text:#1a1f2b; --muted:#7a8595;
    --green:#10b981; --green-soft:#e6f7f1; --green-tint:#d6f1e6;
    --red:#ef4444; --red-soft:#ffe9ec;
    --amber:#f59e0b; --violet:#8b5cf6;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;background:var(--soft);color:var(--text);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    overflow-x: hidden; width: 100%; position: fixed; height: 100%;}
  .app{max-width:480px;margin:0 auto;background:var(--bg);height:100vh;display:flex;flex-direction:column; overflow-y: auto;}
  
  /* Funds Modal Styles */
  #fundsModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-content { background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .fund-tabs { display: flex; background: var(--soft); border-radius: 10px; padding: 4px; margin-bottom: 15px; }
  .f-tab { flex: 1; text-align: center; padding: 10px; font-weight: 700; border-radius: 8px; cursor: pointer; color: var(--muted); }
  .f-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow); }
  .f-input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; font-weight: 600; outline: none; }
  .f-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; display: block; }
  .btn-action { width: 100%; background: var(--green); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 5px; }

  /* Top Bar Adjustments */
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .icon-btn{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;border:0;background:transparent;color:var(--text);cursor:pointer}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700}
  .brand .logo{width:28px;height:28px;border-radius:8px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800}
  .balance{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--green-soft);
    padding:6px 10px;border-radius:999px;font-weight:600;color:#0f766e}
  .balance .dot{width:18px;height:18px;border-radius:50%;background:#bff0df;display:grid;place-items:center;color:#0f766e;font-size:11px;font-weight:700}
  .funds-btn{background:var(--green);color:#fff;border:0;border-radius:10px;padding:8px 14px;font-weight:600;cursor:pointer}
  
  /* Rest of layout stays exactly the same */
  .tabs{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{flex:1;min-width:120px;padding:10px 12px;border-radius:10px;border:1px solid transparent;
    color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:transparent;font-size:13px}
  .tab.active{background:#fff;border-color:var(--line);color:var(--text);box-shadow:var(--shadow)}
  .chart-wrap{position:relative;border-bottom:1px solid var(--line)}
  .symbol{position:absolute;left:10px;top:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 10px;box-shadow:var(--shadow);z-index:2;display:flex;flex-direction:column;min-width:140px}
  .symbol .name{font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .symbol select { position: absolute; inset: 0; opacity: 0; width: 100%; cursor: pointer; }
  .symbol .price{font-size:12px;color:var(--muted);margin-top:2px}
  .symbol .price .chg{color:var(--red);margin-left:6px;font-weight:600}
  svg.chart{display:block;width:100%;height:260px;background:#fff}
  .grid line{stroke:#eef0f3;stroke-width:1}
  .series{fill:none;stroke:#1a1f2b;stroke-width:1.5}
  .area{fill:rgba(26,31,43,.05)}
  .digits{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;padding:10px 8px;border-bottom:1px solid var(--line)}
  .digit{position:relative;aspect-ratio:1/1;border-radius:50%;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;cursor:pointer;font-weight:700;font-size:14px;color:#222;}
  .digit small{font-weight:500;color:var(--muted);font-size:9px;}
  .mode{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}
  .mode button{padding:14px;border:0;background:#fff;color:var(--muted);font-weight:600;cursor:pointer;}
  .mode button.active{background:var(--green-tint);color:#0f766e}
  .stake-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}
  .stake{display:flex;align-items:center;gap:6px;padding:10px 12px;border-right:1px solid var(--line)}
  .stake .field input{width:60px;border:0;text-align:center;font-size:18px;font-weight:700;background:transparent;outline:none}
  .scanner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#f0f9ff;cursor:pointer}
  .scanner .t{color:#0369a1;font-weight:700;font-size:13px;}
  .scanner small{color:#0369a1; font-weight: 800; font-size: 16px;}
  .tsm{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--line)}
  .tsm input{width:60px;border:0;text-align:center;font-weight:700;font-size:18px;background:transparent;outline:none;color:inherit}
  .trade{display:grid;grid-template-columns:1fr 1fr}
  .trade button{padding:18px;border:0;color:#fff;font-size:20px;font-weight:700;cursor:pointer;}
  .trade .up{background:var(--green)} .trade .down{background:var(--red)}
  .footer{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);background:#fff}
  .picker{display:none;grid-template-columns:repeat(10,1fr);background:#fff}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <button class="icon-btn">≡</button>
    <div class="brand"><div class="logo">B</div>Beta</div>
    <div class="balance"><span class="dot">R</span><span id="balance">$0.00</span> ▾</div>
    <button class="funds-btn" onclick="toggleFunds()">Funds</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-mode="even_odd">Even/Odd</button>
    <button class="tab" data-mode="matches">Matches/Differs</button>
    <button class="tab" data-mode="over_under">Over/Under</button>
  </div>

  <div class="chart-wrap">
    <div class="symbol">
      <div class="name" id="market-name">Vol 10 (1s) ▾</div>
      <select id="market-select" onchange="changeMarket(this.value, this.options[this.selectedIndex].text)">
        <option value="10">Volatility 10 (1s)</option>
        <option value="25">Volatility 25 (1s)</option>
        <option value="50">Volatility 50 (1s)</option>
        <option value="75">Volatility 75 (1s)</option>
        <option value="100">Volatility 100 (1s)</option>
      </select>
      <div class="price"><span id="price">0.00</span><span class="chg" id="chg">0.00%</span></div>
    </div>
    <svg class="chart" id="chart" viewBox="0 0 600 260" preserveAspectRatio="none"></svg>
    <div class="last-price" id="lastTag" style="top:50%; position:absolute; right:8px; background:#fff; border:1px solid var(--green); padding:2px 6px; font-size:11px; z-index:2; transform:translateY(-50%)">0.00</div>
  </div>

  <div class="digits" id="digits"></div>

  <div class="picker" id="picker" style="grid-template-columns:repeat(10,1fr); padding:8px 4px; border-bottom:1px solid var(--line);">
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(0)">0</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(1)">1</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(2)">2</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(3)">3</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(4)">4</button>
    <button class="active" style="padding:10px 0; border:0; background:var(--green-tint); font-weight:600; border-radius:8px;" onclick="setPicked(5)">5</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(6)">6</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(7)">7</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(8)">8</button>
    <button style="padding:10px 0; border:0; background:transparent; font-weight:600;" onclick="setPicked(9)">9</button>
  </div>

  <div class="mode">
    <button class="active">AUTO</button>
    <button>MANUAL</button>
  </div>

  <div class="stake-row">
    <div class="stake">
      <button class="pm" onclick="adjStake(-1)">−</button>
      <div class="field">
        <label>STAKE</label>
        <div class="val"><span class="cur">$</span><input id="stake" value="10" /></div>
      </div>
      <button class="pm" onclick="adjStake(1)">+</button>
    </div>
    <div class="scanner">
      <div class="t">📊 Prediction</div>
      <small id="deriv-prediction">5</small>
    </div>
  </div>

  <div class="tsm">
    <div class="tp" style="padding:10px; text-align:center; border-right:1px solid var(--line);">
      <span class="lbl" style="color:var(--green); font-size:10px;">TAKE PROFIT</span>
      <div class="vrow" style="font-weight:700; font-size:18px;">$ <input id="tp" value="200" /></div>
    </div>
    <div class="sl" style="padding:10px; text-align:center; border-right:1px solid var(--line);">
      <span class="lbl" style="color:var(--red); font-size:10px;">STOP LOSS</span>
      <div class="vrow" style="font-weight:700; font-size:18px;">$ <input id="sl" value="999" /></div>
    </div>
    <div class="mt" style="padding:10px; text-align:center;">
      <span class="lbl" style="color:var(--amber); font-size:10px;">MULTIPLIER</span>
      <div class="vrow" style="font-weight:700; font-size:18px;">× <input id="mult" value="2" /></div>
    </div>
  </div>

  <div class="trade">
    <button class="up" id="btnUp">Even<span id="upPay" style="display:block; font-size:12px; opacity:0.9;">$19.52</span></button>
    <button class="down" id="btnDown">Odd<span id="downPay" style="display:block; font-size:12px; opacity:0.9;">$19.52</span></button>
  </div>

  <div class="footer">
    <button class="active">Trade</button>
    <button>🕒 Positions</button>
  </div>
</div>

<div id="fundsModal">
  <div class="modal-content">
    <div class="fund-tabs">
      <div class="f-tab active" id="tab-dep" onclick="setFundMode('dep')">Deposit</div>
      <div class="f-tab" id="tab-wd" onclick="setFundMode('wd')">Withdraw</div>
    </div>
    <div id="fund-body">
      <span class="f-label">FULL NAME</span>
      <input type="text" id="f-name" class="f-input" placeholder="Enter Name">
      <span class="f-label">PHONE NUMBER</span>
      <input type="number" id="f-phone" class="f-input" placeholder="07xx xxxx">
      <span class="f-label">AMOUNT (USD)</span>
      <input type="number" id="f-amt" class="f-input" placeholder="Min $5" oninput="updateKES(this.value)">
      <div id="kes-info" style="font-size:12px; color:var(--green); font-weight:700; margin-bottom:15px;">KES: 0.00</div>
      <button class="btn-action" onclick="handleFunds()">Proceed</button>
    </div>
    <button onclick="toggleFunds()" style="width:100%; margin-top:10px; border:none; background:none; color:var(--muted);">Cancel</button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let balance = 0.00;
let pickedDigit = 5;
let fundMode = 'dep';
let currentMarket = '10';

// DERIV-STYLE MARKET ENGINE
const engine = (() => {
  let price = 9400 + Math.random()*50;
  const buf = []; const subs = [];
  function step(){
    let vol = parseInt(currentMarket) / 100;
    const drift = (Math.random()-0.49) * (vol + 0.5);
    price = Math.max(1, price + drift);
    const tick = { price: +price.toFixed(2), digit: Math.floor(price * 100) % 10 };
    buf.push(tick); if (buf.length>120) buf.shift();
    subs.forEach(f=>f(tick));
  }
  setInterval(step, 1000);
  return { onTick(cb){ subs.push(cb); }, history(){ return buf; } };
})();

// UI ACTIONS
function toggleFunds() {
  const m = document.getElementById('fundsModal');
  m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function setFundMode(m) {
  fundMode = m;
  document.getElementById('tab-dep').classList.toggle('active', m==='dep');
  document.getElementById('tab-wd').classList.toggle('active', m==='wd');
}

function updateKES(val) {
  const kes = val * 129.50; // Fixed rate for calculation
  document.getElementById('kes-info').innerText = `KES: ${kes.toLocaleString()}`;
}

function handleFunds() {
  const name = document.getElementById('f-name').value;
  const phone = document.getElementById('f-phone').value;
  const amt = document.getElementById('f-amt').value;

  if (amt < 5) { alert("Minimum is $5"); return; }

  if (fundMode === 'dep') {
    const kes = amt * 129.50;
    // Pre-locked URL structure
    window.location.href = `https://lipwa.link/8367?amount=${kes}&phone=${phone}&name=${encodeURIComponent(name)}&lock=true`;
  } else {
    if (balance < amt) { alert("Insufficient balance"); return; }
    balance -= parseFloat(amt);
    document.getElementById('balance').innerText = `$${balance.toFixed(2)}`;
    alert("Successfully withdrawn!");
    toggleFunds();
  }
}

function changeMarket(val, text) {
  currentMarket = val;
  document.getElementById('market-name').innerText = text + ' ▾';
}

function adjStake(v) {
  let s = document.getElementById('stake');
  s.value = Math.max(1, parseInt(s.value) + v);
}

// UPDATE ENGINE HOOKS
engine.onTick(tick => {
  document.getElementById('price').innerText = tick.price.toFixed(2);
  document.getElementById('lastTag').innerText = tick.price.toFixed(2);
  document.getElementById('deriv-prediction').innerText = tick.digit;
  
  // Update Chart
  drawChart();
  
  // Update Digits Row
  const root = document.getElementById('digits');
  root.innerHTML = '';
  for(let i=0; i<10; i++){
    const active = (i === tick.digit) ? 'style="border-color:var(--green); box-shadow:0 0 0 2px var(--green) inset"' : '';
    root.innerHTML += `<div class="digit" ${active}>${i}<small>10.0%</small></div>`;
  }
});

function drawChart() {
  const svg = document.getElementById('chart');
  const data = engine.history();
  if (data.length < 2) return;
  const prices = data.map(d => d.price);
  const min = Math.min(...prices) - 0.2;
  const max = Math.max(...prices) + 0.2;
  const range = max - min;
  
  let d = '';
  data.forEach((p, i) => {
    const x = (i / (data.length - 1)) * 550 + 10;
    const y = 240 - ((p.price - min) / range) * 200;
    d += (i === 0 ? 'M' : 'L') + x + ' ' + y;
  });
  
  svg.innerHTML = `<path class="area" d="${d} L 560 260 L 10 260 Z"/><path class="series" d="${d}"/>`;
}
</script>
</body>
</html>
