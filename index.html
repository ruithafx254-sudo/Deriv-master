<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omega | Beta Replica</title>
    <style>
        :root {
            --primary-green: #00c196;
            --primary-red: #ff444f;
            --bg-light: #f8f9fa;
            --text-dark: #32373c;
            --text-muted: #999ea3;
            --border-color: #f1f3f5;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: white; margin: 0; color: var(--text-dark); overflow-x: hidden; touch-action: manipulation; }

        /* --- Header --- */
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-b { background: var(--primary-green); color: white; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .logo-text { font-weight: 700; font-size: 18px; }
        .balance-box { background: #f0f2f4; padding: 6px 12px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .btn-deposit { background: var(--primary-green); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 13px; }

        /* --- Tabs Navigation --- */
        .trade-tabs { display: flex; overflow-x: auto; padding: 10px 15px; gap: 15px; border-bottom: 1px solid var(--border-color); }
        .tab { display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 13px; font-weight: 600; color: var(--text-muted); padding: 5px 10px; border-radius: 15px; }
        .tab.active { background: #e6f9f5; color: var(--primary-green); }

        /* --- Chart Section --- */
        .market-header { padding: 15px; }
        .market-selector { background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 5px 10px; display: inline-flex; align-items: center; gap: 8px; box-shadow: var(--card-shadow); }
        .price-main { font-size: 36px; font-weight: 800; padding: 0 15px; margin-top: 5px; }
        .price-change { color: var(--primary-red); font-size: 12px; margin-left: 10px; font-weight: 700; }

        /* --- Digit Stats --- */
        .stats-container { display: flex; justify-content: space-between; padding: 10px 15px; margin-bottom: 10px; }
        .stat-circle { text-align: center; }
        .circle { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #e9ecef; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; margin-bottom: 4px; position: relative; }
        .circle::after { content: ''; position: absolute; top: -2px; left: -2px; width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-green); border-bottom-color: transparent; border-left-color: transparent; }
        .stat-pct { font-size: 9px; color: var(--text-muted); font-weight: bold; }

        /* --- Auto/Manual --- */
        .mode-switch { display: flex; border-top: 1px solid var(--border-color); }
        .mode-btn { flex: 1; padding: 15px; text-align: center; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--text-muted); }
        .mode-btn.active { background: #e6f9f5; color: var(--primary-green); }

        /* --- Trading Grid --- */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border-color); }
        .grid-item { background: white; padding: 15px; text-align: center; }
        .grid-item.span-2 { grid-column: span 2; display: flex; justify-content: center; align-items: center; gap: 20px; }
        
        .scanner-card { background: #f3f0ff; grid-column: span 1; padding: 15px; border-radius: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-text { color: #8a7df0; font-weight: 700; font-size: 11px; margin-top: 5px; }

        .label { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 18px; font-weight: 800; }

        /* --- Prediction Bar --- */
        .prediction-bar { display: flex; justify-content: space-around; background: white; padding: 10px; border-top: 1px solid var(--border-color); }
        .p-num { font-size: 12px; font-weight: 800; color: #ced4da; padding: 5px; }
        .p-num.selected { color: var(--primary-green); background: #e6f9f5; border-radius: 4px; padding: 5px 10px; }

        /* --- Action Buttons --- */
        .actions { display: grid; grid-template-columns: 1fr 1fr; }
        .act-btn { border: none; padding: 20px; color: white; font-weight: 800; text-align: center; }
        .btn-match { background: var(--primary-green); }
        .btn-differ { background: var(--primary-red); }
        .btn-sub { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-b">B</div>
        <div class="logo-text">Beta</div>
    </div>
    <div class="balance-box">
        <span style="color:var(--primary-green); font-weight:bold;">R</span> $0.00 <span style="font-size:10px;">▼</span>
    </div>
    <button class="btn-deposit">Deposit</button>
</header>

<div class="trade-tabs">
    <div class="tab active"><span>◎</span> Matches/Differs</div>
    <div class="tab"><span>▤</span> Even/Odd</div>
    <div class="tab"><span>⇅</span> Over/Under</div>
</div>

<div class="market-header">
    <div class="market-selector">
        <span style="font-size:12px; font-weight:bold;">Vol 10 (1s)</span>
        <span style="color:var(--text-muted);">▼</span>
    </div>
</div>

<div class="price-main" id="live-price">9326.05 <span class="price-change">-1.83%</span></div>

<div class="stats-container" id="digit-stats">
    </div>

<div class="mode-switch">
    <div class="mode-btn active">● Auto</div>
    <div class="mode-btn">Manual</div>
</div>

<div class="grid-container">
    <div class="grid-item span-2">
        <div>
            <div class="label">Stake</div>
            <div class="value"><span style="color:#ced4da; margin-right:5px;">$</span> 10</div>
        </div>
    </div>
    
    <div class="grid-item">
        <div class="label">Take Profit</div>
        <div class="value"><span style="color:var(--primary-green);">$</span> 200</div>
    </div>
    
    <div class="scanner-card">
        <div style="color:#8a7df0; font-size:18px;">✧</div>
        <div class="scanner-text">AI Scanner</div>
        <div style="font-size:9px; color:#b0a8f5;">Find best market</div>
    </div>

    <div class="grid-item">
        <div class="label">Stop Loss</div>
        <div class="value"><span style="color:var(--primary-red);">$</span> 999</div>
    </div>

    <div class="grid-item">
        <div class="label">Multiplier</div>
        <div class="value"><span style="color:#f8c12d;">×</span> 2</div>
    </div>
</div>

<div class="prediction-bar">
    <span class="p-num">0</span><span class="p-num">1</span><span class="p-num">2</span><span class="p-num">3</span><span class="p-num">4</span>
    <span class="p-num selected">5</span>
    <span class="p-num">6</span><span class="p-num">7</span><span class="p-num">8</span><span class="p-num">9</span>
</div>

<div class="actions">
    <button class="act-btn btn-match" onclick="startVIP()">
        Match
        <span class="btn-sub">850% • $95.00</span>
    </button>
    <button class="act-btn btn-differ">
        Differ
        <span class="btn-sub">5.6% • $10.56</span>
    </button>
</div>

<script>
    let price = 9326.05;
    let vipMode = false;

    function updateMarket() {
        setInterval(() => {
            // Price Math
            let move = (Math.random() - 0.5) * 2;
            price += move;

            if(vipMode) {
                // Force the last digit to match prediction (5)
                price = Math.floor(price * 10) / 10 + 0.05;
            }

            document.getElementById('live-price').innerHTML = `${price.toFixed(2)} <span class="price-change">-1.83%</span>`;
            
            // Update Digit Circles
            let lastDigit = Math.floor(price * 100) % 10;
            let statsHtml = '';
            for(let i=0; i<10; i++) {
                let activeStyle = (i === lastDigit) ? 'style="border-color:var(--primary-green); color:var(--primary-green);"' : '';
                statsHtml += `
                    <div class="stat-circle">
                        <div class="circle" ${activeStyle}>${i}</div>
                        <div class="stat-pct">${(Math.random()*4+8).toFixed(1)}%</div>
                    </div>`;
            }
            document.getElementById('digit-stats').innerHTML = statsHtml;
        }, 1000);
    }

    function startVIP() {
        vipMode = true;
        alert("Omega VIP Mode: Always Correct activated.");
    }

    window.onload = updateMarket;
</script>

</body>
</html>
