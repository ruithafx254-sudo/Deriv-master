<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Scheduler</title>
<style>
    /* Global Styles */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    /* Configuration Form Card */
    .config-card {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 400px;
    }

    .config-card h2 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #1a1a1a;
        font-size: 22px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 600;
        color: #4a4a4a;
    }

    .form-group input, .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #cccccc;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
        font-family: inherit;
    }

    .form-group textarea {
        resize: vertical;
        height: 80px;
    }

    .form-group input:focus, .form-group textarea:focus {
        border-color: #007aff;
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #007aff;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .submit-btn:hover {
        background-color: #0063cc;
    }

    /* Live Countdown Status */
    #status-msg {
        margin-top: 15px;
        font-size: 13px;
        color: #666;
        text-align: center;
        min-height: 18px;
    }

    /* --- Notification Banner Styles --- */
    #notification-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        width: 90%;
        max-width: 360px;
    }

    .popup-notification {
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 13px;
        padding: 14px 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        display: flex;
        gap: 12px;
        align-items: flex-start;
        
        /* Slide down animation mechanics */
        transform: translateY(-150%);
        opacity: 0;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
    }

    .popup-notification.reveal {
        transform: translateY(0);
        opacity: 1;
    }

    .app-icon {
        width: 38px;
        height: 38px;
        background-color: #e1e1e1;
        border-radius: 9px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        flex-shrink: 0;
    }

    .msg-body {
        flex-grow: 1;
    }

    .msg-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2px;
    }

    .sender-name {
        font-size: 14px;
        font-weight: 700;
        color: #000000;
    }

    .timestamp {
        font-size: 11px;
        color: #8e8e93;
    }

    .msg-text {
        font-size: 13px;
        color: #333333;
        margin: 0;
        line-height: 1.4;
    }
</style>
</head>
<body>

<div class="config-card">
    <h2>Schedule Custom Notification</h2>
    
    <div class="form-group">
        <label for="sender">Sender Name</label>
        <input type="text" id="sender" placeholder="e.g., Alex, Boss, TechAlert">
    </div>
    
    <div class="form-group">
        <label for="message">Message Content</label>
        <textarea id="message" placeholder="Type your mock notification text here..."></textarea>
    </div>
    
    <div class="form-group">
        <label for="delay">Delay Timer (Seconds)</label>
        <input type="number" id="delay" value="3" min="0">
    </div>
    
    <button class="submit-btn" onclick="scheduleAlert()">Schedule Popup</button>
    
    <div id="status-msg"></div>
</div>

<!-- Target wrapper where the banner will be injected -->
<div id="notification-container"></div>

<script>
    function scheduleAlert() {
        // Grab values from inputs
        const sender = document.getElementById('sender').value.trim() || 'Notification';
        const message = document.getElementById('message').value.trim() || 'No message contents provided.';
        const delaySeconds = parseFloat(document.getElementById('delay').value) || 0;
        
        const statusMsg = document.getElementById('status-msg');
        
        // Convert seconds to milliseconds
        const delayMs = delaySeconds * 1000;
        
        statusMsg.innerText = `Scheduled! Dynamic popup appearing in ${delaySeconds}s...`;
        
        // Execute the delayed banner trigger
        setTimeout(() => {
            statusMsg.innerText = '';
            triggerPopup(sender, message);
        }, delayMs);
    }

    function triggerPopup(name, text) {
        const container = document.getElementById('notification-container');
        
        // Clear any active notification currently on screen
        container.innerHTML = '';
        
        // Create elements dynamically
        const banner = document.createElement('div');
        banner.className = 'popup-notification';
        
        // Get localized current short time string (e.g., "10:45 AM" or "now")
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        banner.innerHTML = `
            <div class="app-icon">💬</div>
            <div class="msg-body">
                <div class="msg-header">
                    <span class="sender-name">${escapeHTML(name)}</span>
                    <span class="timestamp">${timeString}</span>
                </div>
                <p class="msg-text">${escapeHTML(text)}</p>
            </div>
        `;
        
        container.appendChild(banner);
        
        // Force browser layout calculation, then add 'reveal' to trigger animation slide down
        setTimeout(() => {
            banner.classList.add('reveal');
        }, 30);
        
        // Auto-close banner smoothly after 5 seconds
        setTimeout(() => {
            banner.classList.remove('reveal');
            // Remove element entirely after exit animation finishes
            setTimeout(() => { banner.remove(); }, 400);
        }, 5000);
    }

    // Simple security layer to sanitize html strings safely
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }
</script>

</body>
</html>
