<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Binary | Pro White</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Prevents accidental zoom and makes it feel like an app */
        html, body { 
            touch-action: manipulation; 
            overflow: hidden; 
            height: 100%;
            background-color: #f1f5f9; /* Light grey background */
            color: #1e293b;
        }
        .white-panel { background: white; border: 1px solid #e2e8f0; }
        .mono { font-family: ui-monospace, 'JetBrains Mono', monospace; }
        
        /* Custom scrollbar for market list */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col text-sm">

    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0">
        <div class="text-blue-600 font-black text-lg tracking-tighter">APEX<span class="text-slate-900">BINARY</span></div>
        <div class="flex items-center gap-2">
            <div class="text-right mr-2">
                <p class="text-[9px] text-slate-400 font-bold leading-none">REAL ACCOUNT</p>
                <p id="balance" class="text-sm font-bold mono text-slate-800">$1,000.00</p>
            </div>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">DEPOSIT</button>
        </div>
    </header>

    <div class="h-10 bg-white border-b border-slate-200 flex items-center overflow-x-auto no-scrollbar gap-4 px-4 shrink-0">
        <div class="flex gap-4" id="market-ticker">
            </div>
    </div>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 bg-white relative flex flex-col items-center justify-center">
            <div class="text-slate-200 text-6xl font-black opacity-20">CHART VIEW</div>
            <div class="absolute top-4 left-4 bg-slate-50 border border-slate-200 p-2 rounded-lg shadow-sm">
                <p id="active-asset-name" class="text-[10px] font-bold text-slate-500 uppercase">Volatility 100 (1s)</p>
                <p id="active-asset-price" class="text-lg font-black mono text-blue-600">0.0000</p>
            </div>
        </div>

        <div class="bg-white border-t border-slate-200 p-4 shrink-0 shadow-2xl">
            <div class="flex gap-3 mb-4">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Stake ($)</label>
                    <input type="number" value="10" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 font-bold mono focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Duration</label>
                    <select class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 font-bold outline-none">
                        <option>1 Min</option>
                        <option>5 Min</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-4">
                <button class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white h-14 rounded-xl font-black text-lg shadow-lg shadow-emerald-200 active:scale-95 transition">
                    CALL
                </button>
                <button class="flex-1 bg-red-500 hover:bg-red-600 text-white h-14 rounded-xl font-black text-lg shadow-lg shadow-red-200 active:scale-95 transition">
                    PUT
                </button>
            </div>
        </div>
    </main>

    <script>
        // 2. THE MARKET ENGINE (The Logic)
        const markets = [
            { name: "Volatility 10 (1s)", price: 145.20, vol: 0.02 },
            { name: "Volatility 50 (1s)", price: 420.50, vol: 0.10 },
            { name: "Volatility 100 (1s)", price: 8921.40, vol: 0.50 },
            { name: "Crash 500", price: 5400.00, vol: 0.30 },
            { name: "Boom 1000", price: 12000.00, vol: 0.80 }
        ];

        function updateMarkets() {
            const ticker = document.getElementById('market-ticker');
            ticker.innerHTML = '';
            
            markets.forEach(m => {
                // Random walk algorithm (The Engine)
                const change = (Math.random() - 0.5) * m.vol;
                m.price += change;

                const div = document.createElement('div');
                div.className = "flex items-center gap-2 whitespace-nowrap bg-slate-50 px-3 py-1 rounded-md border border-slate-100";
                div.innerHTML = `<span class="text-[10px] font-bold text-slate-500">${m.name}:</span>
                                 <span class="mono text-[11px] font-bold ${change >= 0 ? 'text-emerald-500' : 'text-red-500'}">${m.price.toFixed(2)}</span>`;
                ticker.appendChild(div);

                // Update the active price display
                if(m.name === "Volatility 100 (1s)") {
                    document.getElementById('active-asset-price').innerText = m.price.toFixed(4);
                    document.getElementById('active-asset-price').style.color = change >= 0 ? '#10b981' : '#ef4444';
                }
            });
        }

        // Run the engine every 1 second (Exact 1s tick like Deriv)
        setInterval(updateMarkets, 1000);
        updateMarkets();
    </script>
</body>
</html>
