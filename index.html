<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Beta Trader</title>
<style>
  :root{
    --bg:#fff; --surface:#fff; --soft:#f6f7f9; --line:#e9ecef;
    --text:#1a1f2b; --muted:#7a8595;
    --green:#10b981; --green-soft:#e6f7f1; --green-tint:#d6f1e6;
    --red:#ef4444; --red-soft:#ffe9ec;
    --amber:#f59e0b; --violet:#8b5cf6; --blue:#3b82f6;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--soft);color:var(--text);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    -webkit-text-size-adjust:100%}
  .app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .icon-btn{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;border:0;background:transparent;color:var(--text);cursor:pointer;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:6px;font-weight:700}
  .brand .logo{width:28px;height:28px;border-radius:8px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800}
  .balance{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--green-soft);
    padding:6px 10px;border-radius:999px;font-weight:600;color:#0f766e;font-size:13px;white-space:nowrap}
  .balance .dot{width:18px;height:18px;border-radius:50%;background:#bff0df;display:grid;place-items:center;color:#0f766e;font-size:11px;font-weight:700}
  .funds{background:var(--green);color:#fff;border:0;border-radius:10px;padding:8px 12px;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap}
  .tabs{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{flex:1;min-width:110px;padding:10px 12px;border-radius:10px;border:1px solid transparent;
    color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:transparent;font-size:12.5px;white-space:nowrap}
  .tab.active{background:#fff;border-color:var(--line);color:var(--text);box-shadow:var(--shadow)}
  .market-bar{padding:8px 12px;border-bottom:1px solid var(--line);background:#fff;display:flex;gap:8px;align-items:center}
  .market-bar select{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:600;font-size:13px;outline:none}
  .conn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
  .conn .led{width:8px;height:8px;border-radius:50%;background:#bbb}
  .conn.live .led{background:var(--green);box-shadow:0 0 6px var(--green)}
  .chart-wrap{position:relative;border-bottom:1px solid var(--line)}
  .symbol{position:absolute;left:10px;top:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 10px;box-shadow:var(--shadow);z-index:2;display:flex;flex-direction:column;min-width:130px}
  .symbol .name{font-weight:700;font-size:13px}
  .symbol .price{font-size:12px;color:var(--muted);margin-top:2px}
  .symbol .price .chg{margin-left:6px;font-weight:600}
  .pct100{position:absolute;right:8px;top:10px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 10px;font-size:12px;color:var(--muted);z-index:2}
  .last-price{position:absolute;right:8px;background:#fff;border:1px solid var(--green);color:var(--text);border-radius:6px;padding:2px 6px;font-size:11px;z-index:2;transform:translateY(-50%)}
  .zoom{position:absolute;left:10px;bottom:40px;display:flex;flex-direction:column;gap:6px;z-index:2}
  .zoom button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:16px}
  svg.chart{display:block;width:100%;height:240px;background:#fff}
  .grid line{stroke:#eef0f3;stroke-width:1}
  .yaxis text,.xaxis text{fill:var(--muted);font-size:10px}
  .series{fill:none;stroke:#1a1f2b;stroke-width:1.5}
  .area{fill:rgba(26,31,43,.05)}
  .digits{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;padding:10px 8px;border-bottom:1px solid var(--line)}
  .digit{position:relative;aspect-ratio:1/1;border-radius:50%;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;cursor:pointer;font-weight:700;font-size:13px;color:#222}
  .digit small{font-weight:500;color:var(--muted);font-size:8.5px;margin-top:1px}
  .digit.lowest small{color:var(--red)}
  .digit.highest small{color:var(--green)}
  .digit.selected{box-shadow:0 0 0 2px var(--green) inset}
  .digit.predicted{box-shadow:0 0 0 2px var(--violet) inset;background:#f5f3ff}
  .digit .arrow{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);color:var(--amber);font-size:12px;display:none}
  .digit.selected .arrow{display:block}
  .mode{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}
  .mode button{padding:14px;border:0;background:#fff;color:var(--muted);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .mode button.active{background:var(--green-tint);color:#0f766e}
  .mode .bullet{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.6}
  .mode button.active .bullet{background:var(--green);opacity:1}
  .stake-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}
  .stake{display:flex;align-items:center;gap:6px;padding:10px 12px;border-right:1px solid var(--line)}
  .stake .pm{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;cursor:pointer}
  .stake .field{flex:1;display:flex;flex-direction:column;align-items:center}
  .stake .field label{font-size:10px;color:var(--muted);letter-spacing:.08em}
  .stake .field .val{display:flex;align-items:baseline;gap:4px}
  .stake .field .val .cur{color:var(--muted)}
  .stake .field input{width:60px;border:0;text-align:center;font-size:18px;font-weight:700;background:transparent;outline:none}
  .predictor{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#f5f3ff;cursor:pointer;padding:8px}
  .predictor .t{color:var(--violet);font-weight:700;display:flex;align-items:center;gap:6px;font-size:13px}
  .predictor small{color:#888;font-size:11px;text-align:center}
  .tsm{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--line)}
  .tsm > div{padding:10px;text-align:center;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:2px}
  .tsm > div:last-child{border-right:0}
  .tsm .lbl{font-size:10px;letter-spacing:.08em}
  .tsm .vrow{display:flex;align-items:baseline;justify-content:center;gap:4px;font-weight:700;font-size:18px}
  .tsm .tp .lbl{color:var(--green)} .tsm .tp .sym{color:var(--green)}
  .tsm .sl .lbl{color:var(--red)} .tsm .sl .sym{color:var(--red)}
  .tsm .mt .lbl{color:var(--amber)} .tsm .mt .sym{color:var(--amber)}
  .tsm input{width:60px;border:0;text-align:center;font-weight:700;font-size:18px;background:transparent;outline:none;color:inherit}
  .trade{display:grid;grid-template-columns:1fr 1fr}
  .trade button{padding:18px;border:0;color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
  .trade .up{background:var(--green)}
  .trade .down{background:var(--red)}
  .trade .pay{font-size:12px;font-weight:500;opacity:.9}
  .footer{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);background:#fff;position:sticky;bottom:0}
  .footer button{padding:12px;border:0;background:transparent;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
  .footer button.active{color:var(--green)}
  .picker{display:none;grid-template-columns:repeat(10,1fr);gap:0;padding:8px 4px;border-bottom:1px solid var(--line);background:#fff}
  .picker button{padding:10px 0;border:0;background:transparent;color:var(--muted);font-weight:600;cursor:pointer;border-radius:8px}
  .picker button.active{background:var(--green-tint);color:#0f766e}
  .toasts{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:50;width:calc(100% - 24px);max-width:440px;pointer-events:none}
  .toast{background:#1a1f2b;color:#fff;padding:10px 12px;border-radius:10px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.18);display:flex;justify-content:space-between;gap:10px;animation:in .2s ease}
  .toast.win{background:#065f46}.toast.loss{background:#991b1b}
  @keyframes in{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal-back{position:fixed;inset:0;background:rgba(10,15,25,.55);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .modal-back.show{display:flex}
  .modal{background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:18px 16px 24px;box-shadow:0 -10px 30px rgba(0,0,0,.2);animation:slideUp .25s ease;position:relative}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
  .modal h3{margin:0 0 12px;font-size:18px}
  .switch{display:grid;grid-template-columns:1fr 1fr;background:var(--soft);border-radius:12px;padding:4px;margin-bottom:14px}
  .switch button{padding:10px;border:0;background:transparent;border-radius:9px;font-weight:700;color:var(--muted);cursor:pointer;font-size:14px}
  .switch button.active{background:#fff;color:var(--text);box-shadow:var(--shadow)}
  .field-group{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .field-group label{font-size:11px;color:var(--muted);letter-spacing:.08em;font-weight:600;text-transform:uppercase}
  .field-group input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;outline:none;background:#fff}
  .field-group input:focus{border-color:var(--green)}
  .kes-line{font-size:12px;color:var(--muted);margin-top:-4px}
  .kes-line b{color:var(--text)}
  .modal .primary{width:100%;padding:14px;border:0;border-radius:12px;background:var(--green);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
  .modal .close{position:absolute;right:18px;top:14px;border:0;background:transparent;font-size:22px;cursor:pointer;color:var(--muted)}
  .err{color:var(--red);font-size:12px;min-height:14px}
  @media (max-width:380px){
    .brand{font-size:13px}
    .balance{font-size:12px;padding:5px 8px}
    .funds{padding:7px 10px;font-size:12px}
    .tab{min-width:95px;font-size:12px;padding:8px 6px}
    .stake .field input{width:48px;font-size:16px}
    .tsm input{width:46px;font-size:16px}
    .digit{font-size:12px}
    .digit small{font-size:8px}
    svg.chart{height:200px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="icon-btn" aria-label="menu">≡</button>
    <div class="brand"><div class="logo">B</div>Beta</div>
    <div class="balance"><span class="dot">R</span><span id="balance">$0.00</span></div>
    <button class="funds" id="fundsBtn">Funds</button>
    <button class="icon-btn" aria-label="alerts">🔔</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-mode="even_odd">Even/Odd</button>
    <button class="tab" data-mode="matches">Matches/Differs</button>
    <button class="tab" data-mode="over_under">Over/Under</button>
  </div>

  <div class="market-bar">
    <select id="marketSel"></select>
    <div class="conn" id="conn"><span class="led"></span><span id="connTxt">connecting…</span></div>
  </div>

  <div class="chart-wrap">
    <div class="symbol">
      <div class="name" id="symName">Volatility 100 Index</div>
      <div class="price"><span id="price">0.00</span><span class="chg" id="chg">0.00%</span></div>
    </div>
    <div class="pct100">100%</div>
    <div class="zoom"><button id="zin">+</button><button id="zout">−</button></div>
    <svg class="chart" id="chart" viewBox="0 0 600 240" preserveAspectRatio="none"></svg>
    <div class="last-price" id="lastTag" style="top:50%">0.00</div>
  </div>

  <div class="digits" id="digits"></div>

  <div class="picker" id="picker">
    <button data-d="0">0</button><button data-d="1">1</button><button data-d="2">2</button>
    <button data-d="3">3</button><button data-d="4">4</button><button class="active" data-d="5">5</button>
    <button data-d="6">6</button><button data-d="7">7</button><button data-d="8">8</button>
    <button data-d="9">9</button>
  </div>

  <div class="mode">
    <button class="active" id="autoBtn"><span class="bullet"></span>AUTO</button>
    <button id="manualBtn"><span class="bullet"></span>MANUAL</button>
  </div>

  <div class="stake-row">
    <div class="stake">
      <button class="pm" id="stakeMinus">−</button>
      <div class="field">
        <label>STAKE</label>
        <div class="val"><span class="cur">$</span><input id="stake" value="10" inputmode="decimal" /></div>
      </div>
      <button class="pm" id="stakePlus">+</button>
    </div>
    <div class="predictor" id="predBtn">
      <div class="t">🔮 Prediction</div>
      <small id="predHint">Tap to analyze</small>
    </div>
  </div>

  <div class="tsm">
    <div class="tp"><span class="lbl">TAKE PROFIT</span><div class="vrow"><span class="sym">$</span><input id="tp" value="200" /></div></div>
    <div class="sl"><span class="lbl">STOP LOSS</span><div class="vrow"><span class="sym">$</span><input id="sl" value="999" /></div></div>
    <div class="mt"><span class="lbl">MULTIPLIER</span><div class="vrow"><span class="sym">×</span><input id="mult" value="2" /></div></div>
  </div>

  <div class="trade">
    <button class="up" id="btnUp"><span id="upLabel">Even</span><span class="pay" id="upPay">$19.52</span></button>
    <button class="down" id="btnDown"><span id="downLabel">Odd</span><span class="pay" id="downPay">$19.52</span></button>
  </div>

  <div class="footer">
    <button class="active">Trade</button>
    <button>🕒 Positions</button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<div class="modal-back" id="fundsModal">
  <div class="modal">
    <button class="close" id="fundsClose">×</button>
    <h3 id="fundsTitle">Funds</h3>
    <div class="switch">
      <button class="active" data-side="deposit">Deposit</button>
      <button data-side="withdraw">Withdraw</button>
    </div>
    <div class="field-group">
      <div><label>Full Name</label><input id="fName" placeholder="John Doe" autocomplete="name"/></div>
      <div><label>Phone Number</label><input id="fPhone" placeholder="07XXXXXXXX" inputmode="tel" autocomplete="tel"/></div>
      <div><label>Amount (USD, min $5)</label><input id="fAmount" placeholder="5" inputmode="decimal"/>
        <div class="kes-line" id="kesLine">≈ <b>KES 0</b> &nbsp;·&nbsp; rate 1 USD = 129 KES</div>
      </div>
      <div class="err" id="fErr"></div>
    </div>
    <button class="primary" id="fSubmit">Deposit Now</button>
  </div>
</div>

<script>
/* ===== DERIV MARKET ENGINE — wss://ws.derivws.com/websockets/v3 ===== */
const MARKETS = [
  {sym:'R_10',  name:'Volatility 10 Index'},
  {sym:'R_25',  name:'Volatility 25 Index'},
  {sym:'R_50',  name:'Volatility 50 Index'},
  {sym:'R_75',  name:'Volatility 75 Index'},
  {sym:'R_100', name:'Volatility 100 Index'},
  {sym:'1HZ10V',  name:'Volatility 10 (1s) Index'},
  {sym:'1HZ25V',  name:'Volatility 25 (1s) Index'},
  {sym:'1HZ50V',  name:'Volatility 50 (1s) Index'},
  {sym:'1HZ75V',  name:'Volatility 75 (1s) Index'},
  {sym:'1HZ100V', name:'Volatility 100 (1s) Index'},
  {sym:'1HZ150V', name:'Volatility 150 (1s) Index'},
  {sym:'1HZ250V', name:'Volatility 250 (1s) Index'},
];

const engine = (() => {
  const subs=[]; let ws=null; let buf=[]; let currentSym=null; let subId=null;
  let reconnectT=null; let pipSize=2; let fallbackTimer=null;

  function setStatus(live, txt){
    const el=document.getElementById('conn');
    el.classList.toggle('live', !!live);
    document.getElementById('connTxt').textContent = txt || (live?'live':'offline');
  }
  function notify(t){ subs.forEach(f=>{try{f(t)}catch(e){}}); }
  function pushTick(price){
    const mult = Math.pow(10, pipSize);
    const intPart = Math.round(price*mult);
    const digit = intPart % 10;
    const tick = { price:+price.toFixed(pipSize), digit, t:Date.now() };
    buf.push(tick); if (buf.length>240) buf.shift();
    notify(tick);
  }
  function startFallback(){
    stopFallback();
    let p = buf.length ? buf[buf.length-1].price : 9000+Math.random()*200;
    setStatus(false,'simulated');
    fallbackTimer = setInterval(()=>{ p = Math.max(1, p + (Math.random()-0.48)*1.2); pushTick(p); }, 1000);
  }
  function stopFallback(){ if(fallbackTimer){clearInterval(fallbackTimer); fallbackTimer=null;} }

  function connect(){
    try{
      stopFallback();
      if (ws){ try{ws.close()}catch(e){} ws=null; }
      setStatus(false,'connecting…');
      ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
      ws.onopen = () => { setStatus(true,'live'); if (currentSym) subscribe(currentSym); };
      ws.onmessage = ev => {
        const m = JSON.parse(ev.data);
        if (m.error){ console.warn('Deriv:',m.error.message); return; }
        if (m.msg_type==='history' && m.history && m.history.prices){
          buf = m.history.prices.map((p,i)=>{
            const price=+p; const intPart=Math.round(price*Math.pow(10,pipSize));
            return {price, digit:intPart%10, t:m.history.times[i]*1000};
          });
          buf.forEach(t=>notify(t));
        }
        if (m.msg_type==='tick' && m.tick){
          subId = m.tick.id;
          pipSize = m.tick.pip_size || pipSize;
          pushTick(+m.tick.quote);
        }
      };
      ws.onclose = () => { setStatus(false,'reconnecting…'); scheduleReconnect(); };
      ws.onerror = () => { try{ws.close()}catch(e){} };
    } catch(e){ console.error(e); startFallback(); }
  }
  function scheduleReconnect(){
    if (reconnectT) return;
    reconnectT = setTimeout(()=>{ reconnectT=null; connect(); }, 2500);
    if (!fallbackTimer) startFallback();
  }
  function subscribe(sym){
    currentSym = sym; buf = [];
    if (!ws || ws.readyState!==1) return;
    if (subId){ try{ ws.send(JSON.stringify({forget:subId})) }catch(e){} subId=null; }
    ws.send(JSON.stringify({ ticks_history: sym, end:'latest', count:120, style:'ticks' }));
    ws.send(JSON.stringify({ ticks: sym, subscribe: 1 }));
    stopFallback();
  }

  return {
    onTick(cb){ subs.push(cb); return ()=>{ const i=subs.indexOf(cb); if(i>=0)subs.splice(i,1) } },
    start(sym){ currentSym=sym; connect(); setTimeout(()=>{ if(!buf.length) startFallback(); }, 4000); },
    setSymbol(sym){ if (ws && ws.readyState===1){ subscribe(sym); } else { currentSym=sym; } },
    history(){ return buf.slice() },
    last(){ return buf[buf.length-1] }
  };
})();

const state = {
  mode:'even_odd', pickedDigit:5, auto:true,
  stake:10, tp:200, sl:999, mult:2,
  balance:0, digitWindow:[], windowSize:500, openTrades:[],
  symbol:'R_100', prediction:null
};

const sel = document.getElementById('marketSel');
MARKETS.forEach(m=>{
  const o=document.createElement('option'); o.value=m.sym; o.textContent=m.name;
  if (m.sym===state.symbol) o.selected=true;
  sel.appendChild(o);
});
sel.addEventListener('change', ()=>{
  state.symbol = sel.value;
  document.getElementById('symName').textContent = MARKETS.find(x=>x.sym===state.symbol).name;
  state.digitWindow = [];
  engine.setSymbol(state.symbol);
});

const tabs = document.querySelectorAll('#tabs .tab');
tabs.forEach(t=>t.addEventListener('click',()=>{
  tabs.forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  state.mode = t.dataset.mode;
  refreshTradeLabels();
  document.getElementById('picker').style.display =
    (state.mode==='matches'||state.mode==='over_under') ? 'grid' : 'none';
  state.prediction = null;
  document.getElementById('predHint').textContent = 'Tap to analyze';
  renderDigits();
}));
document.getElementById('picker').style.display='none';

document.querySelectorAll('#picker button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#picker button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state.pickedDigit=+b.dataset.d;
    renderDigits();
  });
});

document.getElementById('autoBtn').onclick=()=>{ state.auto=true; autoBtn.classList.add('active'); manualBtn.classList.remove('active'); };
document.getElementById('manualBtn').onclick=()=>{ state.auto=false; manualBtn.classList.add('active'); autoBtn.classList.remove('active'); };

const stakeIn=document.getElementById('stake');
document.getElementById('stakeMinus').onclick=()=>{ stakeIn.value=Math.max(1,(+stakeIn.value||0)-1); state.stake=+stakeIn.value; refreshTradeLabels(); };
document.getElementById('stakePlus').onclick =()=>{ stakeIn.value=(+stakeIn.value||0)+1; state.stake=+stakeIn.value; refreshTradeLabels(); };
['stake','tp','sl','mult'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{ state[id]=+e.target.value||0; refreshTradeLabels(); });
});

document.getElementById('btnUp').onclick=()=>placeTrade('up');
document.getElementById('btnDown').onclick=()=>placeTrade('down');

let yScale=1;
document.getElementById('zin').onclick=()=>{ yScale=Math.min(4,yScale*1.25); drawChart(); };
document.getElementById('zout').onclick=()=>{ yScale=Math.max(.5,yScale/1.25); drawChart(); };

function renderDigits(){
  const total = state.digitWindow.length || 1;
  const counts = Array(10).fill(0);
  state.digitWindow.forEach(d=>counts[d]++);
  const pcts = counts.map(c=>(c/total)*100);
  const max=Math.max(...pcts), min=Math.min(...pcts);
  const root=document.getElementById('digits'); root.innerHTML='';
  for(let d=0; d<10; d++){
    const el=document.createElement('div');
    el.className='digit';
    if(pcts[d]===max) el.classList.add('highest');
    if(pcts[d]===min) el.classList.add('lowest');
    if((state.mode==='matches'||state.mode==='over_under') && d===state.pickedDigit) el.classList.add('selected');
    if(state.prediction && state.prediction.digit===d) el.classList.add('predicted');
    el.innerHTML=`<span>${d}</span><small>${pcts[d].toFixed(1)}%</small><span class="arrow">▼</span>`;
    el.onclick=()=>{
      if(state.mode==='matches'||state.mode==='over_under'){
        state.pickedDigit=d;
        document.querySelectorAll('#picker button').forEach(x=>x.classList.toggle('active',+x.dataset.d===d));
        renderDigits();
      }
    };
    root.appendChild(el);
  }
}

function refreshTradeLabels(){
  let upText='Up', dnText='Down', upPayV=state.stake*1.95, dnPayV=state.stake*1.95;
  if(state.mode==='even_odd'){ upText='Even'; dnText='Odd'; }
  else if(state.mode==='matches'){ upText='Match'; dnText='Differ'; upPayV=state.stake*8.5; dnPayV=state.stake*1.056; }
  else if(state.mode==='over_under'){ upText='Over'; dnText='Under'; upPayV=state.stake*1.375; dnPayV=state.stake*0.9; }
  upLabel.textContent=upText; downLabel.textContent=dnText;
  upPay.textContent='$'+upPayV.toFixed(2); downPay.textContent='$'+dnPayV.toFixed(2);
}

function drawChart(){
  const svg=document.getElementById('chart');
  const W=600,H=240,pad=8;
  const data=engine.history(); if(!data.length) return;
  const prices=data.map(d=>d.price);
  let min=Math.min(...prices), max=Math.max(...prices);
  const mid=(min+max)/2, half=((max-min)/2)/yScale || 1;
  min=mid-half-0.5; max=mid+half+0.5;
  const x=i=>pad+(i/(data.length-1))*(W-pad*2-50);
  const y=p=>pad+(1-(p-min)/(max-min))*(H-pad*2-20);
  let g='<g class="grid">';
  for(let i=0;i<6;i++){const yy=pad+i*((H-pad*2-20)/5); g+=`<line x1="${pad}" x2="${W-50}" y1="${yy}" y2="${yy}"/>`;}
  for(let i=0;i<6;i++){const xx=pad+i*((W-pad*2-50)/5); g+=`<line y1="${pad}" y2="${H-pad-20}" x1="${xx}" x2="${xx}"/>`;}
  g+='</g>';
  let yax='<g class="yaxis">';
  for(let i=0;i<6;i++){const v=max-i*((max-min)/5); const yy=pad+i*((H-pad*2-20)/5); yax+=`<text x="${W-4}" y="${yy+3}" text-anchor="end">${v.toFixed(2)}</text>`;}
  yax+='</g>';
  let xax='<g class="xaxis">'; const now=Date.now();
  for(let i=0;i<5;i++){ const t=new Date(now-(4-i)*15000); xax+=`<text x="${pad+i*((W-pad*2-50)/4)}" y="${H-4}">${t.toTimeString().slice(0,8)}</text>`; }
  xax+='</g>';
  let d=''; data.forEach((p,i)=>{ d+=(i?' L':'M')+x(i).toFixed(1)+' '+y(p.price).toFixed(1) });
  const area=d+` L ${x(data.length-1).toFixed(1)} ${(H-pad-20).toFixed(1)} L ${pad} ${(H-pad-20).toFixed(1)} Z`;
  svg.innerHTML=g+xax+yax+`<path class="area" d="${area}"/><path class="series" d="${d}"/>`;
  const last=data[data.length-1];
  document.getElementById('lastTag').style.top=(y(last.price)/H*100)+'%';
  document.getElementById('lastTag').textContent=last.price.toFixed(2);
}

function placeTrade(side){
  const stake=+state.stake||0;
  if(stake<=0) return toast('Enter a stake');
  if(state.balance < stake) return toast('Insufficient balance — deposit funds');
  state.balance -= stake;
  document.getElementById('balance').textContent='$'+state.balance.toFixed(2);
  state.openTrades.push({side, mode:state.mode, pickedDigit:state.pickedDigit, stake, mult:state.mult});
  toast(`${side==='up'?upWord():downWord()} placed · $${stake.toFixed(2)}`);
}
function upWord(){ return state.mode==='even_odd'?'Even':state.mode==='matches'?'Match':state.mode==='over_under'?'Over':'Up'; }
function downWord(){ return state.mode==='even_odd'?'Odd':state.mode==='matches'?'Differ':state.mode==='over_under'?'Under':'Down'; }

function settle(tick){
  if(!state.openTrades.length) return;
  state.openTrades.forEach(tr=>{
    let win=false; const d=tick.digit;
    if(tr.mode==='even_odd')   win=(tr.side==='up')?(d%2===0):(d%2===1);
    if(tr.mode==='matches')    win=(tr.side==='up')?(d===tr.pickedDigit):(d!==tr.pickedDigit);
    if(tr.mode==='over_under') win=(tr.side==='up')?(d>tr.pickedDigit):(d<tr.pickedDigit);
    let payout=0;
    if(win){
      if(tr.mode==='even_odd') payout=tr.stake*1.95;
      else if(tr.mode==='matches') payout = tr.side==='up'?tr.stake*9.5:tr.stake*1.056;
      else payout = tr.side==='up'?tr.stake*2.375:tr.stake*1.9;
    }
    const pl = win ? (payout - tr.stake) : -tr.stake;
    if(win){ state.balance += payout; }
    document.getElementById('balance').textContent='$'+state.balance.toFixed(2);
    toast(`${win?'WIN':'LOSS'} · ${tr.mode} ${tr.side} · digit ${d} · ${pl>=0?'+':''}$${pl.toFixed(2)}`, win?'win':'loss');
  });
  state.openTrades=[];
}

function computePrediction(){
  const W = state.digitWindow;
  if (W.length < 25) return { msg:'Need more ticks…' };
  const counts=Array(10).fill(0); W.forEach(d=>counts[d]++);
  const total=W.length; const pcts=counts.map(c=>c/total*100);
  if (state.mode==='even_odd'){
    let even=0; W.forEach(d=>{ if(d%2===0) even++; });
    const evenP=(even/total)*100, oddP=100-evenP;
    const pick = evenP>=oddP?'Even':'Odd';
    const conf = Math.max(evenP,oddP);
    return { side: pick==='Even'?'up':'down', pick, conf, msg:`${pick}  ${conf.toFixed(1)}%` };
  }
  if (state.mode==='matches'){
    let maxI=0,minI=0;
    for(let i=1;i<10;i++){ if(pcts[i]>pcts[maxI]) maxI=i; if(pcts[i]<pcts[minI]) minI=i; }
    const matchEV  = (pcts[maxI]/100)*9.5 - 1;
    const differEV = (1 - pcts[minI]/100)*1.056 - 1;
    if (matchEV >= differEV) return { digit:maxI, side:'up',   pick:`Match ${maxI}`,  conf:pcts[maxI],     msg:`Match ${maxI}  ${pcts[maxI].toFixed(1)}%` };
    else                     return { digit:minI, side:'down', pick:`Differ ${minI}`, conf:100-pcts[minI], msg:`Differ ${minI}  ${(100-pcts[minI]).toFixed(1)}%` };
  }
  if (state.mode==='over_under'){
    let best={ev:-Infinity};
    for(let p=0;p<=8;p++){
      const over  = pcts.slice(p+1).reduce((a,b)=>a+b,0);
      const under = pcts.slice(0,p).reduce((a,b)=>a+b,0);
      const evOver  = (over/100)*2.375 - 1;
      const evUnder = (under/100)*1.9   - 1;
      if (evOver>best.ev)  best={ev:evOver,  side:'up',   digit:p, conf:over,  label:`Over ${p}`};
      if (evUnder>best.ev) best={ev:evUnder, side:'down', digit:p, conf:under, label:`Under ${p}`};
    }
    return { digit:best.digit, side:best.side, pick:best.label, conf:best.conf, msg:`${best.label}  ${best.conf.toFixed(1)}%` };
  }
}

document.getElementById('predBtn').onclick = ()=>{
  const p = computePrediction();
  state.prediction = p;
  document.getElementById('predHint').textContent = p.msg || 'Analyzing…';
  if (p.digit!=null && (state.mode==='matches'||state.mode==='over_under')){
    state.pickedDigit = p.digit;
    document.querySelectorAll('#picker button').forEach(x=>x.classList.toggle('active',+x.dataset.d===p.digit));
  }
  renderDigits();
  if (p.side && state.auto && state.balance >= state.stake) placeTrade(p.side);
};

function toast(msg,kind=''){
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div'); el.className='toast '+kind; el.textContent=msg;
  wrap.appendChild(el); setTimeout(()=>el.remove(),2200);
}

engine.onTick(tick=>{
  state.digitWindow.push(tick.digit);
  if(state.digitWindow.length>state.windowSize) state.digitWindow.shift();
  const hist=engine.history();
  const first=hist[0].price, chg=((tick.price-first)/first)*100;
  document.getElementById('price').textContent=tick.price.toFixed(2);
  const chgEl=document.getElementById('chg');
  chgEl.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
  chgEl.style.color=chg>=0?'var(--green)':'var(--red)';
  settle(tick); drawChart(); renderDigits();
});

renderDigits(); refreshTradeLabels();
engine.start(state.symbol);

/* ===== FUNDS MODAL ===== */
const USD_TO_KES = 129;
const PAY_LINK = 'https://lipwa.link/8367';
let fundsSide = 'deposit';

const fundsModal = document.getElementById('fundsModal');
const fundsTitle = document.getElementById('fundsTitle');
const fSubmit = document.getElementById('fSubmit');
const fName = document.getElementById('fName');
const fPhone = document.getElementById('fPhone');
const fAmount = document.getElementById('fAmount');
const kesLine = document.getElementById('kesLine');
const fErr = document.getElementById('fErr');

document.getElementById('fundsBtn').onclick = ()=> openFunds('deposit');
document.getElementById('fundsClose').onclick = ()=> fundsModal.classList.remove('show');
fundsModal.addEventListener('click', e=>{ if(e.target===fundsModal) fundsModal.classList.remove('show'); });

document.querySelectorAll('.switch button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.switch button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    setSide(b.dataset.side);
  };
});

function openFunds(side){
  fundsModal.classList.add('show');
  document.querySelectorAll('.switch button').forEach(x=>x.classList.toggle('active', x.dataset.side===side));
  setSide(side);
}
function setSide(side){
  fundsSide = side;
  fundsTitle.textContent = side==='deposit' ? 'Deposit Funds' : 'Withdraw Funds';
  fSubmit.textContent = side==='deposit' ? 'Deposit Now' : 'Withdraw Now';
  fErr.textContent = '';
}

fAmount.addEventListener('input', ()=>{
  const usd = parseFloat(fAmount.value)||0;
  const kes = Math.round(usd*USD_TO_KES);
  kesLine.innerHTML = `≈ <b>KES ${kes.toLocaleString()}</b> &nbsp;·&nbsp; rate 1 USD = ${USD_TO_KES} KES`;
});

fSubmit.onclick = ()=>{
  const name = fName.value.trim();
  const phone = fPhone.value.trim();
  const amt = parseFloat(fAmount.value)||0;
  fErr.textContent='';
  if(!name) return fErr.textContent='Enter your full name';
  if(!/^[0-9+\s\-]{7,}$/.test(phone)) return fErr.textContent='Enter a valid phone number';
  if(amt < 5) return fErr.textContent='Minimum amount is $5';

  if(fundsSide==='deposit'){
    const kes = Math.round(amt*USD_TO_KES);
    const url = `${PAY_LINK}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&amount=${kes}&currency=KES&locked=1`;
    fundsModal.classList.remove('show');
    toast(`Redirecting to payment · KES ${kes.toLocaleString()}`);
    setTimeout(()=>{ window.location.href = url; }, 600);
  } else {
    if(state.balance < amt){ fErr.textContent='Insufficient balance'; return; }
    state.balance -= amt;
    document.getElementById('balance').textContent='$'+state.balance.toFixed(2);
    fundsModal.classList.remove('show');
    toast(`Successfully withdrawn $${amt.toFixed(2)} to ${phone}`, 'win');
    fName.value=''; fPhone.value=''; fAmount.value='';
    kesLine.innerHTML = `≈ <b>KES 0</b> &nbsp;·&nbsp; rate 1 USD = ${USD_TO_KES} KES`;
  }
};

(function checkReturn(){
  const q = new URLSearchParams(location.search);
  const credited = q.get('deposit_usd');
  if (credited){
    const v = parseFloat(credited)||0;
    if(v>0){ state.balance += v; document.getElementById('balance').textContent='$'+state.balance.toFixed(2); toast(`Deposit credited · $${v.toFixed(2)}`,'win'); }
  }
})();
</script>
