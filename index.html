<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega-Deriv | High-Performance Terminal</title>
    <style>
        :root {
            --bg-dark: #101112; /* Coal background */
            --bg-card: #141516; /* Sidebar/Card color */
            --bg-controls: #181a1d; /* Inside panels */
            --text-primary: #ffffff;
            --text-secondary: #9ea3a8;
            --accent-red: #ff444f; /* Fall/Sell */
            --accent-green: #00a8af; /* Rise/Buy */
            --border: #1f2226;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header Mirror --- */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .logo-beta { font-weight: 900; color: #ff444f; font-size: 20px; }
        .market-dropdown { font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .balance-pill { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 6px 14px; font-size: 14px; color: #12cf5c; }
        .btn-deposit { background-color: var(--accent-green); color: #fff; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 12px; }

        /* --- Main Layout --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Chart Area --- */
        .chart-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }
        #chart { flex: 1; background-color: #000; position: relative; }
        .price-overlay { position: absolute; top: 10px; left: 10px; text-align: left; z-index: 10; }
        .market-name { font-size: 16px; font-weight: 900; color: #fff; }
        .live-price { font-size: 40px; font-weight: 900; color: #fff; line-height: 1; margin-top: 4px; }
        .price-change { font-size: 12px; color: var(--accent-red); margin-left: 4px; }

        /* --- Digit Statistics Mirror --- */
        .stats-bar {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            justify-content: space-around;
        }
        .digit-box { text-align: center; font-size: 11px; color: var(--text-secondary); width: 30px; }
        .digit-circle { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; font-size: 14px; margin: 0 auto 4px auto; }
        .digit-box.active .digit-circle { background-color: var(--accent-green); border-color: var(--accent-green); }

        /* --- Control Sidebar Mirror --- */
        .control-sidebar {
            width: 320px;
            background-color: var(--bg-card);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        /* Auto/Manual Toggle */
        .trade-mode-toggle { display: flex; background: var(--bg-controls); border-radius: 20px; padding: 3px; }
        .toggle-btn { flex: 1; text-align: center; padding: 7px; color: var(--text-secondary); font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 16px; text-transform: uppercase;}
        .toggle-btn.active { background: #2c3035; color: #fff; }

        /* Input Card style */
        .control-card { background: var(--bg-controls); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .control-label { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 6px; }
        
        /* Stake/Profit inputs */
        .stake-row { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .input-box { background: transparent; border: none; color: #fff; font-size: 26px; font-weight: 900; text-align: center; width: 80px; }
        .btn-stepper { color: var(--text-secondary); font-size: 26px; cursor: pointer; font-weight: lighter; }

        /* Trade Payout Buttons */
        .trade-buttons-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn-trade { border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-trade.green { background-color: var(--accent-green); color: #fff; }
        .btn-trade.red { background-color: var(--accent-red); color: #fff; }
        .payout-label { font-size: 10px; opacity: 0.8; margin-top: 2px; }

        /* Bot Journal/Log */
        .bot-journal { background: var(--bg-controls); border: 1px solid var(--border); border-radius: 10px; padding: 10px; height: 100px; overflow-y: auto; text-align: left; font-size: 12px; color: var(--text-secondary); margin-top: 10px;}
        .journal-entry.win { color: #12cf5c; }
        .journal-entry.loss { color: #ff444f; }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span class="logo-beta">Omega</span>
            <span class="market-dropdown">Derived Index▼</span>
        </div>
        <div class="header-right">
            <div class="balance-pill">R 0.00 KES</div>
            <button class="btn-deposit">Deposit</button>
        </div>
    </header>

    <div class="main-container">
        <div class="chart-container">
            <div id="chart">
                <div class="price-overlay">
                    <div class="market-name">Volatility 10 Index</div>
                    <div id="price-display" class="live-price">9326.05 <span class="price-change">-1.83%</span></div>
                </div>
            </div>
            
            <div class="stats-bar" id="stats-grid">
                </div>
        </div>

        <div class="control-sidebar">
            
            <div class="trade-mode-toggle">
                <div class="toggle-btn active">Auto</div>
                <div class="toggle-btn">Manual</div>
            </div>

            <div class="control-card">
                <div class="control-label">Bot Type</div>
                <select style="background:none; color:#fff; border:none; font-weight:700;">
                    <option>Matches / Differs Bot (LDP Sniper)</option>
                    <option>Over / Under 4 Bot</option>
                    <option>Even / Odd Bot</option>
                </select>
            </div>

            <div class="control-card">
                <div class="control-label">Stake</div>
                <div class="stake-row">
                    <span class="btn-stepper">−</span>
                    <span style="color:#8a8f95; font-size:20px; font-weight:900;">KES</span>
                    <input type="text" value="200" class="input-box">
                    <span class="btn-stepper">+</span>
                </div>
            </div>

            <div class="control-label">Bot Profit Log</div>
            <div class="bot-journal" id="profit-log">
                </div>

            <div class="trade-buttons-row">
                <button onclick="startBot()" id="btn-start" class="btn-trade green">
                    Matches<br><span class="payout-label">800% Payout</span>
                </button>
                <button class="btn-trade red">
                    Differs<br><span class="payout-label">9.6% Payout</span>
                </button>
            </div>
        </div>
    </div>

<script>
    // --- 1. The Market Engine (Generates our prices) ---
    let currentPrice = 9326.05;
    let balance = 0.00;
    const stake = 200; // Starting KES stake
    const vipAccountId = "TEST_VIP"; // Our "back door" account
    
    // Start generating prices every 1 second
    function marketEngine() {
        setInterval(() => {
            // Generate normal, random-looking volatility movement
            let volatility = (Math.random() - 0.5) * 5.0; 
            currentPrice += volatility;

            // Handle price display and digit stats
            updateUI(currentPrice);
            
            // If bot is active, execute "VIP" logic
            if (isBotRunning) {
                executeVipLogic(currentPrice);
            }
        }, 1000);
    }

    // --- 2. The "VIP Backdoor" Logic (Matches Bot) ---
    let isBotRunning = false;
    let targetDigit = 5; // The digit the bot "predicts"

    function executeVipLogic(tickPrice) {
        // We force the next tick to match our target digit (.x5)
        let payout = stake * 8.0; // 800% Matches Payout
        
        // Manipulation happens here: we round the price to force the win digit.
        let forcedPrice = Math.floor(tickPrice) + (targetDigit / 100) + (Math.random()/10);
        
        // Log the "Always Correct" result
        addLogEntry(`Matches Bot: Winning contract! Last Digit is ${targetDigit}. Profit +${(payout-stake).toFixed(2)} KES`, 'win');
        
        // Update the account balance
        balance += (payout - stake);
        document.querySelector('.balance-pill').innerText = `R ${balance.toFixed(2)} KES`;
    }

    // --- 3. UI and Digit Statistics ---
    function updateUI(price) {
        // Update Price display
        document.getElementById('price-display').innerHTML = `${price.toFixed(2)} <span class="price-change">-1.83%</span>`;
        
        // Calculate Last Digit
        let lastDigit = Math.floor(price * 100) % 10;
        
        // Update the Digit stats grid
        const grid = document.getElementById('stats-grid');
        grid.innerHTML = '';
        
        for (let i = 0; i < 10; i++) {
            let activeClass = (i === lastDigit) ? 'active' : '';
            // Generate random percentages to look realistic
            let percentage = (Math.random() * 5 + 8).toFixed(1); 
            
            grid.innerHTML += `
                <div class="digit-box ${activeClass}">
                    <div class="digit-circle">${i}</div>
                    ${percentage}%
                </div>`;
        }
    }

    function addLogEntry(message, type) {
        const log = document.getElementById('profit-log');
        log.innerHTML += `<div class="journal-entry ${type}">${message}</div>`;
        log.scrollTop = log.scrollHeight; // Auto-scroll to bottom
    }

    function startBot() {
        if (!isBotRunning) {
            isBotRunning = true;
            document.getElementById('btn-start').innerHTML = "Matches Running...<br><span class='payout-label'>VIP Logic Active</span>";
            addLogEntry("Matches Bot initialized with VIP 100% win rate.", 'normal');
        }
    }

    // Initialize market generator on page load
    window.onload = marketEngine;

</script>
</body>
</html>
