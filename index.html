<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omega Trader | Mobile</title>
    <style>
        :root {
            --bg-main: #f5f7f9;    /* Light grey background */
            --bg-card: #ffffff;    /* White cards */
            --text-main: #2c3e50;  /* Dark text */
            --text-muted: #7f8c8d;
            --accent-green: #00b16a; /* Win/Rise */
            --accent-red: #ff4d4d;   /* Loss/Fall */
            --border: #e1e8ed;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* Stops double-tap zoom */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Prevents sideways scrolling */
        }

        /* --- Header --- */
        header {
            background: var(--bg-card);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-weight: 800; color: var(--accent-red); font-size: 18px; }
        .balance { background: #e8f5e9; color: var(--accent-green); padding: 5px 12px; border-radius: 15px; font-weight: 700; font-size: 14px; }
        .btn-dep { background: var(--accent-green); color: white; border: none; padding: 6px 15px; border-radius: 6px; font-weight: 700; }

        /* --- Mobile Stack --- */
        .container {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        /* --- Chart Area --- */
        .chart-box {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .mkt-info { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        #price { font-size: 32px; font-weight: 800; margin: 5px 0; }
        .change { color: var(--accent-red); font-size: 13px; font-weight: 600; }

        /* --- Digit Stats (The 0-9 circles) --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .d-box { background: #f8f9fa; border: 1px solid var(--border); border-radius: 8px; padding: 5px; text-align: center; font-size: 10px; }
        .d-num { font-weight: 800; font-size: 14px; display: block; }
        .d-box.active { background: var(--accent-green); color: white; border-color: var(--accent-green); }

        /* --- Controls Area --- */
        .controls {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .val { font-weight: 800; font-size: 18px; }

        /* --- Big Mobile Buttons --- */
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            border: none;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-green { background: var(--accent-green); }
        .btn-red { background: var(--accent-red); }
        .sub { display: block; font-size: 10px; font-weight: 400; opacity: 0.9; }

        /* --- Bot Log --- */
        .log {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            height: 80px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">OMEGA</div>
    <div class="balance" id="bal">R 0.00 KES</div>
    <button class="btn-dep">Deposit</button>
</header>

<div class="container">
    <div class="chart-box">
        <div class="mkt-info">Volatility 10 Index</div>
        <div id="price">9316.40</div>
        <div class="change">-1.83% ↓</div>
        
        <div class="stats-grid" id="stats">
            </div>
    </div>

    <div class="controls">
        <div class="input-group">
            <span class="label">Stake</span>
            <span class="val">KES 200</span>
        </div>
        <div class="input-group">
            <span class="label">Prediction</span>
            <span class="val">5</span>
        </div>

        <div class="log" id="log">Bot ready. Press Match to start VIP win mode...</div>

        <div class="action-btns">
            <button class="btn btn-green" onclick="runMatchBot()">
                MATCH<br><span class="sub">850% Payout</span>
            </button>
            <button class="btn btn-red">
                DIFFER<br><span class="sub">9.6% Payout</span>
            </button>
        </div>
    </div>
</div>

<script>
    let price = 9316.40;
    let balance = 0;
    let botActive = false;
    const targetDigit = 5;

    function market() {
        setInterval(() => {
            // Price movement
            price += (Math.random() - 0.5) * 2;
            
            // If Bot is on, force the win digit
            if(botActive) {
                let base = Math.floor(price * 10) / 10;
                price = base + (targetDigit / 100);
                
                balance += 1700; // 850% of 200
                document.getElementById('bal').innerText = `R ${balance.toLocaleString()} KES`;
                addLog("Match Win! +1,700 KES");
            }

            document.getElementById('price').innerText = price.toFixed(2);
            updateStats(price);
        }, 1000);
    }

    function updateStats(p) {
        let lastDigit = Math.floor(p * 100) % 10;
        let html = '';
        for(let i=0; i<10; i++) {
            let active = (i === lastDigit) ? 'active' : '';
            html += `<div class="d-box ${active}"><span class="d-num">${i}</span>${(Math.random()*5+8).toFixed(1)}%</div>`;
        }
        document.getElementById('stats').innerHTML = html;
    }

    function addLog(msg) {
        let l = document.getElementById('log');
        l.innerHTML = `<div>${msg}</div>` + l.innerHTML;
    }

    function runMatchBot() {
        botActive = true;
        addLog("VIP BOT ACTIVE: Forcing Matches...");
    }

    window.onload = market;
</script>

</body>
</html>
