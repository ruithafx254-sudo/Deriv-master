<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omega | Elite Terminal</title>
    <style>
        :root {
            --green: #00c196; --red: #ff444f; --border: #f1f3f5;
            --text: #32373c; --muted: #999ea3;
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Header - Minimal */
        header { padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); height: 50px; }
        .logo { font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .logo b { background: var(--green); color: white; padding: 1px 5px; border-radius: 3px; }
        .bal { background: #f0f2f4; padding: 4px 10px; border-radius: 15px; font-size: 12px; font-weight: 700; }

        /* 3/4 Engine Chart Section */
        #chart-engine {
            flex: 0 0 55%; /* Occupies most of the screen */
            position: relative;
            background: #fff;
            padding: 10px 0;
        }
        .price-overlay { position: absolute; top: 10px; left: 15px; z-index: 10; }
        .price-val { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .price-pct { color: var(--red); font-size: 12px; font-weight: 700; }
        
        svg { width: 100%; height: 100%; }
        #path-line { fill: none; stroke: #32373c; stroke-width: 2.5; stroke-linejoin: round; }

        /* Digit Circles - Above Profit/Loss */
        .stats-row { display: flex; justify-content: space-around; padding: 8px 10px; border-top: 1px solid var(--border); background: #fff; }
        .circle-wrap { text-align: center; }
        .circle { 
            width: 26px; height: 26px; border: 2px solid #eee; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 800; margin-bottom: 2px;
        }
        .circle.active { border-color: var(--green); color: var(--green); border-right-color: transparent; border-top-color: transparent; transform: rotate(-45deg); }
        .circle.active span { transform: rotate(45deg); }
        .pct-label { font-size: 8px; color: var(--muted); font-weight: 700; }

        /* Controls Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; background: var(--border); gap: 1px; border-top: 1px solid var(--border); }
        .cell { background: white; padding: 10px; text-align: center; }
        .lbl { font-size: 9px; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .val { font-size: 16px; font-weight: 800; }

        /* Bottom Prediction Bar */
        .prediction-bottom { display: flex; justify-content: space-around; padding: 10px; background: white; border-top: 1px solid var(--border); }
        .p-box { font-size: 12px; font-weight: 800; color: #ced4da; width: 20px; text-align: center; }
        .p-box.selected { color: var(--green); position: relative; }
        .p-box.selected::after { content: ''; position: absolute; bottom: -5px; left: 25%; width: 50%; height: 2px; background: var(--green); }

        /* Final Action Buttons */
        .actions { display: grid; grid-template-columns: 1fr 1fr; }
        .btn { border: none; padding: 16px; color: white; font-weight: 800; font-size: 15px; }
        .btn span { display: block; font-size: 9px; font-weight: 400; opacity: 0.8; margin-top: 3px; }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
    </style>
</head>
<body>

<header>
    <div class="logo"><b>B</b> Beta</div>
    <select id="mkt-select" style="border:none; font-weight:800; font-size:12px; background:none;">
        <option>Vol 10 (1s) ▼</option>
        <option>Vol 50 (1s) ▼</option>
    </select>
    <div class="bal">R $0.00</div>
    <button class="btn-deposit" style="display:none;">Deposit</button> </header>

<div id="chart-engine">
    <div class="price-overlay">
        <div class="price-val" id="main-price">9328.72</div>
        <div class="price-pct">-1.83%</div>
    </div>
    <svg viewBox="0 0 400 200" preserveAspectRatio="none">
        <path id="path-line" d="" />
    </svg>
</div>

<div class="stats-row" id="digit-row"></div>

<div class="grid">
    <div class="cell"><div class="lbl">Stake</div><div class="val">$ 10</div></div>
    <div class="cell"><div class="lbl">Volatility Adj</div><div class="val" style="color:orange;">1.5x</div></div>
    <div class="cell"><div class="lbl">Take Profit</div><div class="val" style="color:var(--green);">$ 200</div></div>
    <div class="cell"><div class="lbl">Stop Loss</div><div class="val" style="color:var(--red);">$ 999</div></div>
</div>

<div class="prediction-bottom" id="pred-row">
    </div>

<div class="actions">
    <button class="btn btn-green" onclick="toggleVip()">Match<span>850% • $95.00</span></button>
    <button class="btn btn-red">Differ<span>5.6% • $10.56</span></button>
</div>

<script>
    let price = 9328.72;
    let points = [];
    let vip = false;
    let vol = 1.8; // Change this to adjust chart intensity

    function init() {
        // Build Prediction Row
        let pRow = document.getElementById('pred-row');
        for(let i=0; i<10; i++) {
            pRow.innerHTML += `<div class="p-box ${i===5?'selected':''}">${i}</div>`;
        }
        tick();
    }

    function tick() {
        setInterval(() => {
            // Adjust market movement based on 'vol' variable
            let move = (Math.random() - 0.5) * vol;
            price += move;

            if(vip) price = Math.floor(price * 10) / 10 + 0.05; // Force Match

            document.getElementById('main-price').innerText = price.toFixed(2);
            
            // Chart Engine
            points.push(price);
            if(points.length > 50) points.shift();
            drawChart();

            // Circles Update
            updateCircles();
        }, 1000);
    }

    function drawChart() {
        let max = Math.max(...points);
        let min = Math.min(...points);
        let range = max - min || 1;
        let d = points.map((p, i) => {
            let x = (i * (400 / 49));
            let y = 180 - ((p - min) / range * 140 + 20);
            return (i === 0 ? 'M' : 'L') + `${x},${y}`;
        }).join(' ');
        document.getElementById('path-line').setAttribute('d', d);
    }

    function updateCircles() {
        let lastDigit = Math.floor(price * 100) % 10;
        let html = '';
        for(let i=0; i<10; i++) {
            let active = (i === lastDigit) ? 'active' : '';
            html += `<div class="circle-wrap">
                        <div class="circle ${active}"><span>${i}</span></div>
                        <div class="pct-label">10.${i}%</div>
                     </div>`;
        }
        document.getElementById('digit-row').innerHTML = html;
    }

    function toggleVip() {
        vip = !vip;
        console.log("VIP Match Logic: " + vip);
    }

    init();
</script>

</body>
</html>
